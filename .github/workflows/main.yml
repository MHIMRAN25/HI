name: Node.js CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # এই লাইনটি যোগ করলে ম্যানুয়ালি রান করা যাবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    - run: npm installami 
